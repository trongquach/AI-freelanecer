spring:
  application:
    name: ai-freelance-marketplace

  profiles:
    active: dev

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      timeout: 2000ms

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080
  servlet:
    context-path: /

# JWT Configuration
jwt:
  private-key: ${JWT_PRIVATE_KEY_BASE64:}
  public-key: ${JWT_PUBLIC_KEY_BASE64:}
  access-token-expiration: 900000      # 15 minutes
  refresh-token-expiration: 604800000  # 7 days

# AI Configuration
ai:
  provider: ${AI_PROVIDER:ANTHROPIC}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: https://api.anthropic.com/v1
    model: claude-3-haiku-20240307
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini

# Stripe
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  mock: false
  success-url: ${FRONTEND_URL:http://localhost:3000}/wallet?payment=success
  cancel-url: ${FRONTEND_URL:http://localhost:3000}/wallet?payment=cancelled

# AWS
aws:
  region: ${AWS_REGION:ap-southeast-1}
  s3:
    bucket-name: ${S3_BUCKET_NAME:aimarket-uploads-dev}
    presigned-url-expiration: 3600

# App Config
app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  platform-fee-percent: 10
  min-withdraw-amount: 50
  max-ai-calls-per-hour: 10

# Actuator
management:
  health:
    mail:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# SpringDoc OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
