spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: true

  jpa:
    show-sql: false

logging:
  level:
    com.aimarket: INFO
    org.springframework: WARN

stripe:
  mock: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
