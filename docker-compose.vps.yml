version: '3.9'

networks:
  aimarket-vps-network:
    driver: bridge

volumes:
  mysql-data-prod:
    driver: local
  redis-data-prod:
    driver: local

services:
  mysql:
    image: mysql:8.0
    container_name: aimarket-mysql-prod
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: aimarket_db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data-prod:/var/lib/mysql
      - ./aimarket_db.sql:/docker-entrypoint-initdb.d/1-aimarket_db.sql
      - ./seed_data.sql:/docker-entrypoint-initdb.d/2-seed_data.sql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=256M
      --max-connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aimarket-vps-network

  redis:
    image: redis:7-alpine
    container_name: aimarket-redis-prod
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - aimarket-vps-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aimarket-backend-prod
    restart: unless-stopped
    ports:
      - "18080:8080"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/aimarket_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      FRONTEND_URL: http://aimarketswp.duckdns.org
      STRIPE_MOCK: "false"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - aimarket-vps-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aimarket-frontend-prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aimarket-vps-network
